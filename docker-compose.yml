version: "3.8"

services:
  dev-db:
    image: postgres:13
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - freecodecamp
  test-db:
    image: postgres:13
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: nest 
    networks:
      - freecodecamp
  pgadmin:
    image: dpage/pgadmin4
    container_name: nest-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - dev-db
    networks:
      - freecodecamp
networks:
  freecodecamp:


# şu anlama gelir:
# Veritabanına bağlanırken:
# kullanıcı = postgres
# Prisma sadece bu bilgileri .env içinden okuyup bağlanır.